<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
  <!-- AI Brain/Circuit Pattern for dark theme -->
  <g fill="none" stroke="#AFB1B3" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Central processor/brain -->
    <rect x="6" y="6" width="8" height="8" rx="1.5" fill="#6C7B7F" fill-opacity="0.3"/>
    
    <!-- Neural connections -->
    <path d="M3 3 L6 6" stroke="#6C7B7F"/>
    <path d="M17 3 L14 6" stroke="#6C7B7F"/>
    <path d="M3 17 L6 14" stroke="#6C7B7F"/>
    <path d="M17 17 L14 14" stroke="#6C7B7F"/>
    
    <!-- Data nodes -->
    <circle cx="3" cy="3" r="1.2" fill="#6C7B7F"/>
    <circle cx="17" cy="3" r="1.2" fill="#6C7B7F"/>
    <circle cx="3" cy="17" r="1.2" fill="#6C7B7F"/>
    <circle cx="17" cy="17" r="1.2" fill="#6C7B7F"/>
    
    <!-- Central processing lines -->
    <path d="M7.5 10 L12.5 10" stroke="#6C7B7F" stroke-width="1.5"/>
    <path d="M10 7.5 L10 12.5" stroke="#6C7B7F" stroke-width="1.5"/>
    
    <!-- Git commit symbol (small) -->
    <circle cx="10" cy="10" r="2" fill="#7CB342" stroke="#7CB342" stroke-width="0.5"/>
  </g>
  
  <!-- Sparkle effect for AI -->
  <g fill="#FFC107" opacity="0.7">
    <circle cx="2" cy="10" r="0.6"/>
    <circle cx="18" cy="10" r="0.6"/>
    <circle cx="10" cy="2" r="0.6"/>
    <circle cx="10" cy="18" r="0.6"/>
  </g>
</svg>